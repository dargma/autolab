task: mnist_creative_sweep
dataset: MNIST
constraint:
  fps: 2000
  device: cpu
  batch_size: 1
  max_latency_ms: 0.50
search:
  parallel_workers: 4
  metric: accuracy
  budget: 3600s
  candidates:
    # === ARCHITECTURE INNOVATIONS ===

    # BatchNorm CNN — BN stabilizes training, often +0.5-1% accuracy
    - name: bn-cnn-16-32
      type: cnn_bn
      channels: [1, 16, 32]
      fc: [512, 10]

    # BatchNorm CNN with dropout — regularization for generalization
    - name: bn-cnn-16-32-drop
      type: cnn_bn
      channels: [1, 16, 32]
      fc: [512, 10]
      dropout: 0.25

    # Residual CNN — skip connections from ResNet, adapted for tiny models
    - name: res-cnn-16-32
      type: residual_cnn
      channels: [1, 16, 32]
      fc: [512, 10]

    # Squeeze-and-Excitation CNN — channel attention from SENet (Hu et al.)
    - name: se-cnn-16-32
      type: squeeze_excite_cnn
      channels: [1, 16, 32]
      fc: [512, 10]

    # Wider BN-CNN — more capacity
    - name: bn-cnn-32-64
      type: cnn_bn
      channels: [1, 32, 64]
      fc: [512, 10]

    # Wider residual CNN
    - name: res-cnn-32-64
      type: residual_cnn
      channels: [1, 32, 64]
      fc: [256, 10]

    # === TERNARY QUANTIZATION (cross-domain from edge-AI) ===

    # Full ternary CNN — weights {-a, 0, +a} via TWN (Li et al. 2016)
    # Multiplications become additions; potential latency win
    - name: ternary-cnn-16-32
      type: ternary_cnn
      channels: [1, 16, 32]
      fc: [512, 10]

    # Hybrid ternary — ternary convs + full-precision FC head
    # Rationale: conv layers dominate compute, FC dominates accuracy
    - name: ternary-hybrid-16-32
      type: ternary_hybrid_cnn
      channels: [1, 16, 32]
      fc: [512, 10]

    # Wider ternary — more capacity compensates quantization loss
    - name: ternary-cnn-32-64
      type: ternary_cnn
      channels: [1, 32, 64]
      fc: [512, 10]

    # Wider hybrid ternary
    - name: ternary-hybrid-32-64
      type: ternary_hybrid_cnn
      channels: [1, 32, 64]
      fc: [512, 10]

    # === BASELINE REFERENCES ===

    # Original big-cnn (no BN) for fair comparison
    - name: big-cnn-ref
      type: cnn
      channels: [1, 16, 32]
      fc: [512, 10]

    # Original tiny-cnn for reference
    - name: tiny-cnn-ref
      type: cnn
      channels: [1, 8, 16]
      fc: [256, 10]

train:
  epochs: 15
  lr: 0.002
  optimizer: adamw
  weight_decay: 0.0001
  scheduler: cosine
  augmentation: true
  label_smoothing: 0.05
  jit: true
  seed: 42
